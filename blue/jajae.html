<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>자재팀 점검 체크리스트</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
      background: #f5f6f8;
      color: #222;
      padding: 40px 20px;
    }

    .wrap {
      max-width: 900px;
      margin: 0 auto;
    }

    .card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 32px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.04);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 28px;
      line-height: 1.3;
    }

    .desc {
      margin: 0 0 28px;
      font-size: 15px;
      color: #666;
    }

    .section {
      margin-bottom: 28px;
    }

    .section h2 {
      margin: 0 0 14px;
      font-size: 18px;
      padding-bottom: 8px;
      border-bottom: 2px solid #222;
    }

    .check-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .check-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: 44px;
      padding: 10px 12px;
      border: 1px solid #e5e5e5;
      border-radius: 8px;
      background: #fafafa;
    }

    .check-item span {
      flex: 1;
      font-size: 15px;
      line-height: 1.5;
    }

    .check-item input[type="checkbox"] {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      cursor: pointer;
    }

    .note-box {
      margin-top: 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: #fafafa;
      padding: 14px;
    }

    .note-box textarea {
      width: 100%;
      min-height: 100px;
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 12px;
      font: inherit;
      resize: vertical;
    }

    .improve-box textarea {
      min-height: 140px;
    }

    @media (max-width: 640px) {
      .card {
        padding: 20px;
      }

      h1 {
        font-size: 24px;
      }

      .check-item {
        align-items: flex-start;
        padding: 12px;
      }

      .check-item input[type="checkbox"] {
        margin-top: 2px;
      }
    }
  </style>

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-Z2MJ6TZXHK"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-Z2MJ6TZXHK');
  </script>

</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>자재팀 점검 체크리스트</h1>
      

      <section class="section">
        <h2>1. 불출내역 관리</h2>
        <div class="check-list">
          <label class="check-item">
            <span>불출 시 불출내역이 작성되고 있는가</span>
            <input type="checkbox" />
          </label>
          <label class="check-item">
            <span>불출 일자, 자재명, 수량이 기록되고 있는가</span>
            <input type="checkbox" />
          </label>
          <label class="check-item">
            <span>불출자 또는 요청자가 기록되고 있는가</span>
            <input type="checkbox" />
          </label>
          <label class="check-item">
            <span>사용 목적 또는 사용 현장이 기재되고 있는가</span>
            <input type="checkbox" />
          </label>
          <label class="check-item">
            <span>작성 누락 없이 지속적으로 관리되고 있는가</span>
            <input type="checkbox" />
          </label>
        </div>
      </section>

      <section class="section">
        <h2>2. 입고 및 재고 관리</h2>
        <div class="check-list">
          <label class="check-item">
            <span>자재 입고 시 입고내역이 작성되고 있는가</span>
            <input type="checkbox" />
          </label>
          <label class="check-item">
            <span>관리 방식이 정해져 있는가</span>
            <input type="checkbox" />
          </label>
          <label class="check-item">
            <span>자재별 현재 재고 수량 파악이 가능한가</span>
            <input type="checkbox" />
          </label>
          <label class="check-item">
            <span>실제 재고와 장부상 재고가 일치하는가</span>
            <input type="checkbox" />
          </label>
          <label class="check-item">
            <span>부족 자재를 바로 확인할 수 있는가</span>
            <input type="checkbox" />
          </label>
        </div>
      </section>

      <section class="section">
        <h2>3. 사용 흐름 및 추적</h2>
        <div class="check-list">
          <label class="check-item">
            <span>현장 반출 후 사용처 추적이 가능한가</span>
            <input type="checkbox" />
          </label>
          <label class="check-item">
            <span>반납 자재 내역이 관리되고 있는가</span>
            <input type="checkbox" />
          </label>
          <label class="check-item">
            <span>폐기 자재 내역이 별도로 관리되고 있는가</span>
            <input type="checkbox" />
          </label>
          <label class="check-item">
            <span>동일 자재 중복 불출 여부를 확인할 수 있는가</span>
            <input type="checkbox" />
          </label>
          <label class="check-item">
            <span>월별 또는 기간별 정리가 되고 있는가</span>
            <input type="checkbox" />
          </label>
        </div>
      </section>

      <section class="section">
        <h2>4. 운영 관리</h2>
        <div class="check-list">
          <label class="check-item">
            <span>담당자 외에도 기록 확인이 가능한가</span>
            <input type="checkbox" />
          </label>
          <label class="check-item">
            <span>급한 출고 시에도 사후 작성이 이루어지는가</span>
            <input type="checkbox" />
          </label>
          <label class="check-item">
            <span>자재 요청부터 불출까지 확인 절차가 있는가</span>
            <input type="checkbox" />
          </label>
          <label class="check-item">
            <span>책임자 확인 또는 승인 절차가 있는가</span>
            <input type="checkbox" />
          </label>
          <label class="check-item">
            <span>분실, 누락, 과다불출 위험 요소가 관리되고 있는가</span>
            <input type="checkbox" />
          </label>
        </div>
      </section>

      <section class="section">
        <h2>5. 확인 필요 사항</h2>
        <div class="check-list">
          <label class="check-item">
            <span>불출내역 작성 기준 또는 양식이 있는가</span>
            <input type="checkbox" />
          </label>
          <label class="check-item">
            <span>작성 항목이 담당자마다 다르지 않은가</span>
            <input type="checkbox" />
          </label>
          <label class="check-item">
            <span>최근 1개월 불출내역을 바로 확인할 수 있는가</span>
            <input type="checkbox" />
          </label>
          <label class="check-item">
            <span>실제 사용량과 기록이 대체로 맞는가</span>
            <input type="checkbox" />
          </label>
          <label class="check-item">
            <span>즉시 개선이 필요한 문제점이 확인되는가</span>
            <input type="checkbox" />
          </label>
        </div>
      </section>

      <section class="section">
        <h2>6. 현 자재팀 상황</h2>
        <div class="note-box">
          <textarea placeholder=""></textarea>
        </div>
      </section>

      <section class="section">
        <h2>7. 개선점</h2>
        <div class="note-box improve-box">
          <textarea placeholder=""></textarea>
        </div>
      </section>
    </div>
  </div>
</body>
</html>
